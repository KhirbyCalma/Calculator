<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro&display=swap" rel="stylesheet">
        <script src="script.js" defer></script>
        <title>Calculator</title>
    </head>
    <body>
        <header>Calculator</header>
        <main>
            <section id="calculator-container">
                <section id="calculator-display">
                    <p id="calculator-previous-output"></p>
                    <p id="calculator-current-output"></p>
                </section>
                <section id="calculator-functions">
                    <button type="button" id="clear-button">Clear</button>
                    <button type="button" id="delete-button">Delete</button>
                </section>
                <section id="calculator-numpad">
                    <button type="button" class="num-button">1</button>
                    <button type="button" class="num-button">2</button>
                    <button type="button" class="num-button">3</button>
                    <button type="button" class="operator-button">+</button>
                    <button type="button" class="num-button">4</button>
                    <button type="button" class="num-button">5</button>
                    <button type="button" class="num-button">6</button>
                    <button type="button" class="operator-button">-</button>
                    <button type="button" class="num-button">7</button>
                    <button type="button" class="num-button">8</button>
                    <button type="button" class="num-button">9</button>
                    <button type="button" class="operator-button">*</button>
                    <button type="button" id="decimal-button">.</button>
                    <button type="button" class="num-button">0</button>
                    <button type="button" id="equal-button">=</button>
                    <button type="button" class="operator-button">/</button>
                </section>
            </section>
        </main>
        <footer>
            <p>Copyright &copy; Khirby Calma, <script>document.write(new Date().getFullYear());</script></p>
        </footer>
    </body>
</html>
