<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="script.js" defer></script>
        <title>Calculator</title>
    </head>
    <body>
        <main>
            <section id="calculator-display">
                <p id="calculator-output">Result: </p>
            </section>
            <section id="calculator-nums">
                <button type="button" class="num-button" id="zero-button">0</button>
                <button type="button" class="num-button" id="one-button">1</button>
                <button type="button" class="num-button" id="two-button">2</button>
                <button type="button" class="num-button" id="three-button">3</button>
                <button type="button" class="num-button" id="four-button">4</button>
                <button type="button" class="num-button" id="five-button">5</button>
                <button type="button" class="num-button" id="six-button">6</button>
                <button type="button" class="num-button" id="seven-button">7</button>
                <button type="button" class="num-button" id="eigth-button">8</button>
                <button type="button" class="num-button" id="nine-button">9</button>
            </section>
            <section id="calculator-operators">
                <button type="button" class="operator-button" id="add-button">+</button>
                <button type="button" class="operator-button" id="subtract-button">-</button>
                <button type="button" class="operator-button" id="multiply-button">*</button>
                <button type="button" class="operator-button" id="divide-button">/</button>
                <button type="button" class="operator-button" id="equal-button">=</button>
                <button type="button" class="operator-button" id="clear-button">Clear</button>
            </section>
        </main>
    </body>
</html>
